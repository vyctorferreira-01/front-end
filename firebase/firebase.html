<!DOCTYPE html>
<html lang="PT-BR">
    <head>
        <title>FIREBASE</title>
        <style>

        </style>
        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
        getFirestore,
        collection,
        addDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ8RAFtxrU3jWv41ETYV702siGkTgkW-Q",
              authDomain: "proj2a-2ee61.firebaseapp.com",
              projectId: "proj2a-2ee61",
              storageBucket: "proj2a-2ee61.firebasestorage.app",
              messagingSenderId: "1066369264206",
              appId: "1:1066369264206:web:891887ac58b1ca066b311f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const form = document.getElementById("formulario");
        const mensagem = document.getElementById("mensagem");

        form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const cpf = document.getElementById("cpf").value;
        const nome = document.getElementById("nome").value;
        const email = document.getElementById("email").value;
        const telefone = document.getElementById("telefone").value;
        const senha = document.getElementById("senha").value;
        const cep = document.getElementById("cep").value;
        const idade = document.getElementById("idade").value;

        try {
            await addDoc(collection(db, "usuarios"), {
            cpf,
            nome,
            email,
            telefone,
            senha,
            cep,
            idade
            });

            mensagem.textContent = "Usuário salvo com sucesso.";
            mensagem.style.color = "green";
            form.reset();
        } catch (error) {
            mensagem.textContent = "Erro ao salvar: " + error.message;
            mensagem.style.color = "red";
        }
        });
    </script>
    </head>
    <body>
        <form id="formulario">
            <fieldset>
                <legend>Cadastro do Firebase</legend>
                <p>NOME:</p><input type="text" id="nome" class="campo" placeholder="Digite o seu nome" maxlength="100" minlength="5" required><br>
                <p>IDADE</p><input type="text" id="idade" class="campo" placeholder="Digite sua idade" maxlength="2" minlength="1" required><br>
                <p>EMAIL:</p><input type="text" id="email" class="campo" placeholder="Digite seu email" maxlength="50" minlength="10" required><br>
                <p>CPF:</p><input type="text" id="cpf" class="campo" placeholder="Digite seu cpf" maxlength="11" minlength="11" required><br>
                <p>SENHA:</p><input type="text" id="senha" class="campo" placeholder="Digite sua senha" maxlength="10" minlength="5" required><br>
                <p>TELEFONE:</p><input type="text" id="telefone" class="campo" placeholder="Digite seu telefone" maxlength="11" minlength="11" required><br>
                <p>CEP:</p><input type="text" id="cep" class="campo" placeholder="Digite seu cep" maxlength="12" minlength="10" required><br><br>
                <input type="submit" value="Cadastrar">
            </fieldset>
        </form>
    </body>
<html>
